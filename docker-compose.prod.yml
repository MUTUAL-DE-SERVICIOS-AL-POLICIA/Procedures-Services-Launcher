services:

  nats-server:
    build: ./Gateway-Service/nats
    ports:
      - 4222:4222
    restart: always

  gateway-service:
    build:
      context: ./Gateway-Service
      dockerfile: dockerfile.prod
    env_file:
      - .env
      - ./Gateway-Service/.env.compose
    ports:
      - ${CLIENT_GATEWAY_PORT}:3000
    restart: always

  beneficiary-service:
    build:
      context: ./Beneficiary-Service
      dockerfile: dockerfile.prod
    env_file:
      - .env
      - ./Beneficiary-Service/.env.compose
    restart: always

  global-service:
